{% comment %}Renders a points pill. Expects `pts` (Prediction.points_awarded) in context.{% endcomment %}
{% if pts is not None %}
  {% if pts >= 3 %}
    <span style="background:var(--success-light);color:var(--success);border-radius:100px;font-size:12px;font-weight:700;padding:3px 8px;">{{ pts }}pts</span>
  {% elif pts >= 1 %}
    <span style="background:var(--accent-light);color:var(--accent);border-radius:100px;font-size:12px;font-weight:700;padding:3px 8px;">{{ pts }}pt</span>
  {% else %}
    <span style="background:var(--bg);color:var(--text-muted);border-radius:100px;font-size:12px;font-weight:700;padding:3px 8px;border:1px solid var(--border);">{{ pts }}pts</span>
  {% endif %}
{% endif %}
