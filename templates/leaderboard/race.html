<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ pool.name }} · Race</title>
{{ race_data|json_script:"race-data" }}
<style>
  :root{--bg:#0b1020;--panel:#141b2e;--ink:#eef2ff;--muted:#93a0c0;--line:#26304b;--accent:#4f8cff;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:radial-gradient(1200px 600px at 70% -10%,#1a2547,transparent),var(--bg);color:var(--ink);}
  header{padding:18px 22px 8px}
  h1{margin:0;font-size:19px}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 22px 6px}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-wrap:wrap}
  .seg button{background:transparent;color:var(--muted);border:0;padding:8px 14px;font-size:13px;cursor:pointer}
  .seg button.active{background:var(--accent);color:#fff;font-weight:600}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:8px 16px;font-size:14px;cursor:pointer;font-weight:600}
  .btn:hover{border-color:var(--accent)}
  label.lbl{color:var(--muted);font-size:12px;margin-right:4px}
  input[type=range]{accent-color:var(--accent)}
  .stage{position:relative;margin:8px 22px 26px;padding:16px;background:var(--panel);border:1px solid var(--line);border-radius:16px}
  .frameinfo{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;flex-wrap:wrap;gap:6px}
  .frameinfo .match{font-size:16px;font-weight:700}
  .frameinfo .md{color:var(--muted);font-size:13px}
  .frameinfo .cnt{color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums}
  .chart{position:relative;transition:height .3s}
  .row{position:absolute;left:0;right:0;height:30px;display:flex;align-items:center;transition:transform .45s cubic-bezier(.4,.9,.3,1),opacity .3s;will-change:transform}
  .name{width:150px;min-width:150px;text-align:right;padding-right:10px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .barwrap{flex:1;position:relative;height:22px}
  .bar{position:absolute;left:0;top:0;height:22px;border-radius:0 6px 6px 0;min-width:2px;transition:width .45s cubic-bezier(.4,.9,.3,1);display:flex;align-items:center;justify-content:flex-end}
  .val{color:#fff;font-size:12px;font-weight:700;padding:0 8px;text-shadow:0 1px 2px rgba(0,0,0,.4);font-variant-numeric:tabular-nums}
  .rank{position:absolute;left:-2px;top:0;height:22px;display:flex;align-items:center;color:rgba(255,255,255,.85);font-size:11px;font-weight:700;padding-left:6px}
  footer{color:var(--muted);font-size:12px;padding:0 22px 26px}
  .empty{padding:40px 22px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>🏆 {{ pool.name }} — Bar Chart Race</h1>
  <div class="sub" id="poolname"></div>
</header>

<div class="controls">
  <div class="seg" id="stageSeg"></div>
  <div class="seg" id="topSeg">
    <button data-top="10">Top 10</button>
    <button data-top="15" class="active">Top 15</button>
    <button data-top="999">Todos</button>
  </div>
  <button class="btn" id="play">▶ Reproducir</button>
  <label class="lbl">Velocidad</label>
  <input type="range" id="speed" min="120" max="900" step="60" value="480" style="direction:rtl">
</div>

<div class="stage">
  <div class="frameinfo">
    <div><span class="match" id="mMatch"></span> <span class="md" id="mMd"></span></div>
    <div class="cnt" id="mCnt"></div>
  </div>
  <input type="range" id="scrub" min="0" max="0" value="0" style="width:100%;margin-bottom:12px">
  <div class="chart" id="chart"></div>
</div>

<footer>Puntos acumulados por partido (acierto exacto + bonus). Se extiende conforme se registran resultados.</footer>

<script>
const RACE = JSON.parse(document.getElementById("race-data").textContent);
const ROWH = 34;
const rows = new Map();
const chart = document.getElementById("chart");
let state = {stage:0, topN:15, frame:0, playing:false, speed:480};
let timer=null;

function colorFor(name){
  let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0;
  const hue=h%360; return `linear-gradient(90deg,hsl(${hue} 70% 42%),hsl(${(hue+28)%360} 78% 55%))`;
}
function cur(){ return RACE.stages[state.stage]; }

function buildStageTabs(){
  const seg=document.getElementById("stageSeg");
  seg.innerHTML="";
  RACE.stages.forEach((s,i)=>{
    const b=document.createElement("button");
    b.textContent=s.label; b.dataset.i=i; if(i===0)b.classList.add("active");
    seg.appendChild(b);
  });
  seg.onclick=e=>{const b=e.target.closest("button"); if(!b)return;
    seg.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active"); stop(); state.stage=+b.dataset.i; state.frame=0; ensureRows(); render();};
}

function ensureRows(){
  chart.innerHTML=""; rows.clear();
  cur().participants.forEach(name=>{
    const el=document.createElement("div"); el.className="row";
    const nm=document.createElement("div"); nm.className="name"; nm.textContent=name;
    const bw=document.createElement("div"); bw.className="barwrap";
    const bar=document.createElement("div"); bar.className="bar"; bar.style.background=colorFor(name);
    const rk=document.createElement("div"); rk.className="rank";
    const val=document.createElement("div"); val.className="val";
    bar.appendChild(rk); bar.appendChild(val); bw.appendChild(bar);
    el.appendChild(nm); el.appendChild(bw); chart.appendChild(el);
    rows.set(name,{el,bar,val,rk});
  });
}

function render(){
  const d=cur();
  const vals=d.cumulative[state.frame];
  const list=d.participants.map((name,i)=>({name,v:vals[i]})).sort((a,b)=>b.v-a.v||a.name.localeCompare(b.name));
  const topN=Math.min(state.topN,list.length);
  const maxV=Math.max(1,...list.slice(0,topN).map(x=>x.v));
  list.forEach((item,rank)=>{
    const r=rows.get(item.name); if(!r)return;
    if(rank<topN){
      r.el.style.opacity="1"; r.el.style.transform=`translateY(${rank*ROWH}px)`;
      r.bar.style.width=Math.max(2,(item.v/maxV)*100)+"%";
      r.val.textContent=item.v; r.rk.textContent=(rank+1);
    }else{ r.el.style.opacity="0"; r.el.style.transform=`translateY(${topN*ROWH}px)`; }
  });
  chart.style.height=(topN*ROWH)+"px";
  const f=d.frames[state.frame];
  document.getElementById("mMatch").textContent=f.label;
  document.getElementById("mMd").textContent="· "+f.sub;
  document.getElementById("mCnt").textContent=`Partido ${state.frame+1} / ${d.frames.length}`;
  const sc=document.getElementById("scrub"); sc.max=d.frames.length-1; sc.value=state.frame;
  document.getElementById("poolname").textContent=d.label;
}

function step(){ const n=cur().frames.length; if(state.frame>=n-1){stop();return;} state.frame++; render(); }
function play(){ if(state.frame>=cur().frames.length-1)state.frame=0; state.playing=true;
  document.getElementById("play").textContent="⏸ Pausa"; clearInterval(timer); timer=setInterval(step,state.speed); }
function stop(){ state.playing=false; document.getElementById("play").textContent="▶ Reproducir"; clearInterval(timer); }

document.getElementById("play").onclick=()=>state.playing?stop():play();
document.getElementById("speed").oninput=e=>{state.speed=+e.target.value; if(state.playing)play();};
document.getElementById("scrub").oninput=e=>{stop(); state.frame=+e.target.value; render();};
document.getElementById("topSeg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  document.querySelectorAll("#topSeg button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); state.topN=+b.dataset.top; render();});

if(!RACE.stages.length){
  document.querySelector(".stage").innerHTML='<div class="empty">Aún no hay partidos completados en este pool.</div>';
}else{
  buildStageTabs(); ensureRows(); render();
}
</script>
</body>
</html>
