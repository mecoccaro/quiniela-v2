{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<h1>Score Final Picks — {{ tournament }}</h1>
<form method="post">
  {% csrf_token %}
  <fieldset class="module aligned">
    {% for field in form %}
    <div class="form-row">
      <label for="{{ field.id_for_label }}">{{ field.label }}:</label>
      {{ field }}
      {% if field.errors %}<p class="errornote">{{ field.errors }}</p>{% endif %}
    </div>
    {% endfor %}
  </fieldset>
  <div class="submit-row">
    <input type="submit" value="Queue Scoring Task" class="default">
    <a href="{% url 'admin:tournaments_tournament_changelist' %}" class="button cancel-link">Cancel</a>
  </div>
</form>
{% endblock %}
