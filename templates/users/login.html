{% extends "base.html" %}

{% block title %}Ingresar — La Gansa{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-8">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Ingresar</h1>

  <form method="post" novalidate>
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="bg-red-100 text-red-800 rounded p-3 mb-4 text-sm">
        {% for error in form.non_field_errors %}{{ error }}{% endfor %}
      </div>
    {% endif %}

    <div class="mb-4">
      <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="username" id="id_username" autocomplete="email"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
    </div>
    <div class="mb-6">
      <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
      <input type="password" name="password" id="id_password" autocomplete="current-password"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
    </div>

    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg">
      Ingresar
    </button>
  </form>

  <p class="text-center text-sm text-gray-500 mt-4">
    ¿No tienes cuenta? <a href="{% url 'register' %}" class="text-green-600 hover:underline">Registrarse</a>
  </p>
</div>
{% endblock %}
