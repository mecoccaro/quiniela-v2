<script>
(function () {
  'use strict';
  var el = null, pk = null, H = 0, A = 0, onDone = null;
  var _winnerSel = null, _winnerChoice = null;
  var PRESETS = [[0,0],[1,0],[0,1],[1,1],[2,0],[0,2],[2,1],[1,2],[2,2],[3,0],[0,3],[3,1],[1,3],[3,2],[2,3],[4,0],[0,4],[4,1],[1,4]];

  var BTN = 'width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:18px;cursor:pointer;line-height:1;color:var(--text);';
  var WBTN = 'flex:1;padding:6px 4px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--text-muted);';

  function create() {
    var d = document.createElement('div');
    d.id = 'gansa-picker';
    d.style.cssText = 'position:fixed;z-index:9999;background:var(--surface,#fff);border:1.5px solid var(--border,#E5E3DC);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.16);padding:16px;width:264px;display:none;';
    d.innerHTML =
      '<div id="gp-title" style="font-size:12px;font-weight:700;color:var(--text-muted);text-align:center;margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>' +
      '<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;">' +
        '<div style="display:flex;align-items:center;gap:6px;">' +
          '<button onclick="GansaPicker._adj(-1,0)" style="'+BTN+'">−</button>' +
          '<span id="gp-h" style="font-size:26px;font-weight:900;min-width:32px;text-align:center;color:var(--text);">0</span>' +
          '<button onclick="GansaPicker._adj(1,0)" style="'+BTN+'">+</button>' +
        '</div>' +
        '<span style="font-size:22px;font-weight:900;color:var(--text-muted);padding:0 2px;">–</span>' +
        '<div style="display:flex;align-items:center;gap:6px;">' +
          '<button onclick="GansaPicker._adj(0,-1)" style="'+BTN+'">−</button>' +
          '<span id="gp-a" style="font-size:26px;font-weight:900;min-width:32px;text-align:center;color:var(--text);">0</span>' +
          '<button onclick="GansaPicker._adj(0,1)" style="'+BTN+'">+</button>' +
        '</div>' +
      '</div>' +
      '<div id="gp-presets" style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:14px;"></div>' +
      '<div id="gp-winner-wrap" style="display:none;margin-bottom:14px;">' +
        '<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-align:center;margin-bottom:6px;letter-spacing:0.04em;">GANADOR EN PENALES</div>' +
        '<div style="display:flex;gap:6px;">' +
          '<button id="gp-wh" onclick="GansaPicker._pickWinner(\'home\')" style="'+WBTN+'"></button>' +
          '<button id="gp-wa" onclick="GansaPicker._pickWinner(\'away\')" style="'+WBTN+'"></button>' +
        '</div>' +
      '</div>' +
      '<div id="gp-error" style="display:none;color:var(--danger);font-size:12px;font-weight:600;text-align:center;margin-bottom:8px;padding:4px 8px;background:var(--danger-light);border-radius:6px;"></div>' +
      '<div style="display:flex;gap:8px;">' +
        '<button onclick="GansaPicker._clear()" style="flex:1;padding:9px 0;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:700;cursor:pointer;color:var(--text-muted);">Borrar</button>' +
        '<button onclick="GansaPicker._confirm()" style="flex:2;padding:9px 0;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;">Listo</button>' +
      '</div>';

    var grid = d.querySelector('#gp-presets');
    PRESETS.forEach(function (p) {
      var b = document.createElement('button');
      b.dataset.h = p[0]; b.dataset.a = p[1];
      b.className = 'gp-preset';
      b.textContent = p[0] + ':' + p[1];
      b.style.cssText = 'padding:5px 2px;border-radius:6px;border:1.5px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--text);';
      b.onclick = function () { H = p[0]; A = p[1]; _render(); };
      grid.appendChild(b);
    });
    document.body.appendChild(d);
    return d;
  }

  function _render() {
    el.querySelector('#gp-h').textContent = H;
    el.querySelector('#gp-a').textContent = A;
    el.querySelectorAll('.gp-preset').forEach(function (b) {
      var active = parseInt(b.dataset.h) === H && parseInt(b.dataset.a) === A;
      b.style.background = active ? 'var(--accent)' : 'var(--bg)';
      b.style.color = active ? '#fff' : 'var(--text)';
      b.style.borderColor = active ? 'var(--accent)' : 'var(--border)';
    });

    var wrap = el.querySelector('#gp-winner-wrap');
    var btnH = el.querySelector('#gp-wh');
    var btnA = el.querySelector('#gp-wa');
    if (wrap) {
      var showWinner = !!_winnerSel && H === A;
      wrap.style.display = showWinner ? '' : 'none';
      var errEl = el.querySelector('#gp-error');
      if (!showWinner && errEl) { errEl.style.display = 'none'; }
      if (btnH) {
        var hActive = _winnerChoice === 'home';
        btnH.style.background = hActive ? 'var(--accent)' : '#fff';
        btnH.style.color = hActive ? '#fff' : 'var(--text-muted)';
        btnH.style.borderColor = hActive ? 'var(--accent)' : 'var(--border)';
      }
      if (btnA) {
        var aActive = _winnerChoice === 'away';
        btnA.style.background = aActive ? 'var(--accent)' : '#fff';
        btnA.style.color = aActive ? '#fff' : 'var(--text-muted)';
        btnA.style.borderColor = aActive ? 'var(--accent)' : 'var(--border)';
      }
    }
  }

  document.addEventListener('mousedown', function (e) {
    if (el && el.style.display !== 'none' && !el.contains(e.target)) {
      GansaPicker.close();
    }
  });

  window.GansaPicker = {
    open: function (btn, hId, aId, home, away, cb) {
      if (!el) el = create();
      pk = { h: document.getElementById(hId), a: document.getElementById(aId) };
      onDone = cb || null;
      H = parseInt(pk.h.value) || 0;
      A = parseInt(pk.a.value) || 0;
      el.querySelector('#gp-title').textContent = home + ' vs ' + away;

      // Find the winner select in the same form, if any (knockout matches only)
      var form = pk.h.closest ? pk.h.closest('form') : null;
      _winnerSel = form ? form.querySelector('select[name="predicted_winner"]') : null;
      _winnerChoice = null;
      if (_winnerSel && _winnerSel.value) {
        var opts = _winnerSel.querySelectorAll('option[value]:not([value=""])');
        if (opts[0] && _winnerSel.value === opts[0].value) _winnerChoice = 'home';
        else if (opts[1] && _winnerSel.value === opts[1].value) _winnerChoice = 'away';
      }

      // Set winner button labels
      var btnH = el.querySelector('#gp-wh'), btnA = el.querySelector('#gp-wa');
      if (btnH) btnH.textContent = home;
      if (btnA) btnA.textContent = away;

      _render();
      // Position off-screen first so measurement doesn't cause visible flash
      el.style.top = '-9999px';
      el.style.left = '-9999px';
      el.style.display = 'block';
      var r = btn.getBoundingClientRect();
      var W = 264;
      var h = el.offsetHeight;  // actual rendered height
      var top = r.bottom + 8;
      var left = r.left + r.width / 2 - W / 2;
      if (left < 8) left = 8;
      if (left + W > window.innerWidth - 8) left = window.innerWidth - W - 8;
      if (top + h > window.innerHeight - 8) top = r.top - h - 8;
      if (top < 8) top = 8;  // never go above viewport
      el.style.top = top + 'px';
      el.style.left = left + 'px';
    },
    close: function () { if (el) el.style.display = 'none'; },
    _adj: function (dh, da) {
      H = Math.max(0, Math.min(20, H + dh));
      A = Math.max(0, Math.min(20, A + da));
      _render();
    },
    _pickWinner: function (side) {
      _winnerChoice = side;
      var errEl = el.querySelector('#gp-error');
      if (errEl) errEl.style.display = 'none';
      _render();
    },
    _confirm: function () {
      if (!pk) return;
      // Guard: tied score with no penalty winner selected
      if (H === A && _winnerSel && !_winnerChoice) {
        var errEl = el.querySelector('#gp-error');
        if (errEl) {
          errEl.textContent = 'Elige al ganador en penales antes de confirmar.';
          errEl.style.display = '';
        }
        return;  // do not submit
      }
      pk.h.value = H; pk.a.value = A;
      if (_winnerSel) {
        if (H === A && _winnerChoice) {
          var opts = _winnerSel.querySelectorAll('option[value]:not([value=""])');
          _winnerSel.value = _winnerChoice === 'home' ? (opts[0] ? opts[0].value : '') : (opts[1] ? opts[1].value : '');
        } else {
          _winnerSel.value = '';
        }
      }
      pk.h.dispatchEvent(new Event('change', { bubbles: true }));
      if (onDone) onDone();
      GansaPicker.close();
    },
    _clear: function () {
      if (!pk) return;
      pk.h.value = ''; pk.a.value = '';
      if (_winnerSel) _winnerSel.value = '';
      _winnerChoice = null;
      pk.h.dispatchEvent(new Event('change', { bubbles: true }));
      if (onDone) onDone();
      GansaPicker.close();
    }
  };
})();
</script>
